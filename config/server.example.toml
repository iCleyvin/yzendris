# yzendris — Windows host (server) configuration.
# Copy to %APPDATA%\yzendris\server.toml — or just use the GUI (yzendris-gui),
# which writes this file for you, opens the firewall and sets up autostart.

# Global settings.
heartbeat_ms = 1000   # heartbeat interval; a client drops if it stops arriving
clipboard    = true   # sync clipboard text on capture transitions

# ── Clients ───────────────────────────────────────────────────────────────────
# One [[clients]] block per machine that receives the keyboard/mouse. Each has
# an address and a PLACEMENT: either `between` two monitors, or an outer `edge`.
# The orientation of a `between` pair (side by side vs stacked) is detected from
# the monitors' real positions, so a laptop stacked above/below a monitor works
# too (the cursor crosses by the top/bottom edge).
#
# Monitor names are the Windows device names ("DISPLAY1", "DISPLAY2", …) — the
# GUI detects and fills them in.

[[clients]]
name = "laptop"
addr = "192.168.1.42"
port = 7547
tls  = true                      # verify the client cert fingerprint (recommended)
between = ["DISPLAY1", "DISPLAY2"]  # laptop sits between these two monitors

# A second client, placed at the top edge of the desktop:
# [[clients]]
# name = "studio-pc"
# addr = "192.168.1.50"
# port = 7547
# tls  = true
# edge = "top"                   # "right" | "left" | "top" | "bottom"

# ── TLS pairing ───────────────────────────────────────────────────────────────
# With tls = true, each client generates a self-signed cert on first run and
# shows its fingerprint (GUI: Cliente panel). Paste each fingerprint into
# %APPDATA%\yzendris\trusted_peers.txt (one per line) — or add it in the GUI's
# "Huellas TLS confiables" box.
#
# ── Legacy single-client form (still supported) ──────────────────────────────
# Older configs used top-level `client_addr`, `port`, `edge`, `tls` and a
# `[layout]` table instead of [[clients]]. Those are read as a single client.
